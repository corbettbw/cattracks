# Name of your application. Used to uniquely configure containers.
service: cattracks

# Name of the container image.
image: corbettbw/cattracks

# Deploy to these servers.
servers:
  web:
    - 146.190.121.68

proxy:
  ssl: true
  host: cattrackers.org
  app_port: 80

# Credentials for your image host.
registry:
  username: corbettbw
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
  clear:
    SOLID_QUEUE_IN_PUMA: true

# Use a persistent storage volume for Active Storage files.
volumes:
  - "cattracks_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

# PostgreSQL database accessory — runs on the same server
accessories:
  db:
    image: postgres:16
    host: 146.190.121.68
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: cattracks_production
        POSTGRES_USER: cattracks
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"